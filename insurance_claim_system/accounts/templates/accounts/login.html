<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Insurance Claims Portal — Sign In</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>

<style>
body{
font-family:'DM Sans',sans-serif;
background:#0a1628;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.field{margin-bottom:15px;}

label{font-size:13px;color:#9aa9c7;}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#1a6ef5;
color:white;
font-weight:600;
cursor:pointer;
}

.alert{
margin-bottom:15px;
padding:10px;
border-radius:6px;
font-size:13px;
background:#ff6b6b22;
color:#ff6b6b;
}

.register{text-align:center;margin-top:15px;}
</style>

</head>

<body>

<div class="container">

<h1>Sign In</h1>

{% if messages %}
{% for message in messages %}
<div class="alert">{{ message }}</div>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="field">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="field">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit">Sign In</button>

</form>

<div class="register">
Don't have an account?  
<a href="{% url 'accounts:register' %}">Register</a>
</div>

</div>

</body>
</html>
