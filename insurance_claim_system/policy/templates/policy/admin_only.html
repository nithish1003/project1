{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Access Restricted</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:#0a1628;
color:white;
margin:0;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.container{
text-align:center;
padding:40px;
max-width:600px;
background:rgba(255,255,255,0.05);
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
font-family:'DM Serif Display',serif;
margin-bottom:20px;
color:#ff6b6b;
}

.message{
font-size:18px;
color:#9aa9c7;
margin-bottom:30px;
}

.btn{
background:#1a6ef5;
border:none;
padding:12px 24px;
border-radius:6px;
color:white;
font-weight:600;
text-decoration:none;
display:inline-block;
}

.btn:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>Access Restricted</h1>

<div class="message">
{{ message }}
</div>

<a href="{% url 'policy:list' %}" class="btn">Back to Policies</a>

</div>

</body>
</html>
