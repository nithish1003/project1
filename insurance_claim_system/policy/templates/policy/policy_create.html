{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Policy — InsureAI Portal</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:#0a1628;
color:white;
margin:0;
}

.app{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#111c35;
padding:20px;
}

.sidebar-logo{
font-family:'DM Serif Display',serif;
font-size:20px;
margin-bottom:30px;
display:block;
color:white;
text-decoration:none;
}

.nav-item{
display:block;
padding:10px;
color:#9fb3d1;
text-decoration:none;
margin-bottom:5px;
border-radius:6px;
}

.nav-item:hover{
background:#1a2d55;
color:white;
}

.nav-item.active{
background:#1a6ef5;
color:white;
}

/* MAIN */

.main{
flex:1;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#0f1b33;
border-bottom:1px solid #1f335c;
}

.topbar-left{
display:flex;
align-items:center;
}

.back-btn{
text-decoration:none;
color:#9fb3d1;
margin-right:20px;
font-weight:500;
}

.topbar-title{
font-size:20px;
flex:1;
text-align:center;
}

.topbar-right{
display:flex;
align-items:center;
}

.content{
padding:30px;
}

.sec-card{
background:#111c35;
padding:25px;
border-radius:10px;
margin-bottom:20px;
}

.sec-card-title{
font-size:18px;
margin-bottom:15px;
}

.field{
margin-bottom:15px;
}

label{
font-size:13px;
color:#9fb3d1;
}

input,select{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:5px;
background:#1b2c4f;
color:white;
}

.type-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.type-card{
background:#1b2c4f;
padding:15px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.type-card:hover{
background:#25407a;
}

.nav-btns{
margin-top:20px;
display:flex;
justify-content:space-between;
}

.btn{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-primary{
background:#1a6ef5;
color:white;
}

.btn-secondary{
background:#444;
color:white;
}

.step-panel{
display:none;
}

.step-panel.active{
display:block;
}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<nav class="sidebar">

<a class="sidebar-logo" href="{% url 'accounts:login' %}">
InsureAI
</a>

<a class="nav-item" href="{% url 'accounts:admin_dashboard' %}">Dashboard</a>

<a class="nav-item" href="{% url 'policy:list' %}">
My Policies
</a>

<a class="nav-item active" href="{% url 'policy:create' %}">
Create Policy
</a>

<a class="nav-item" href="{% url 'claim:list' %}">Claims</a>

<a class="nav-item" href="{% url 'accounts:logout' %}">
Logout
</a>

</nav>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<div class="topbar-left">
<a class="back-btn" href="{% url 'policy:list' %}">
&#8592; Back
</a>
</div>

<div class="topbar-title">
Create Policy
</div>

<div class="topbar-right">
{{ request.user.username }}
</div>

</div>

<div class="content">

<form method="POST" action="{% url 'policy:create' %}">
{% csrf_token %}

<!-- STEP 1 -->

<div class="step-panel active" id="step1">

<div class="sec-card">

<div class="sec-card-title">
Select Insurance Type
</div>

<div class="type-grid">

<label class="type-card">
<input type="radio" name="policy_type" value="health" hidden>
❤️ Health
</label>

<label class="type-card">
<input type="radio" name="policy_type" value="motor" hidden>
🚗 Motor
</label>

<label class="type-card">
<input type="radio" name="policy_type" value="home" hidden>
🏠 Home
</label>

<label class="type-card">
<input type="radio" name="policy_type" value="life" hidden>
🧑 Life
</label>

</div>

</div>

<div class="nav-btns">
<span></span>
<button type="button" class="btn btn-primary" onclick="nextStep(1)">
Continue →
</button>
</div>

</div>

<!-- STEP 2 -->

<div class="step-panel" id="step2">

<div class="sec-card">

<div class="sec-card-title">
Policy Information
</div>

<div class="field">
<label>Policy Holder</label>
<select name="policyholder_id" required>
    <option value="">Select Policy Holder</option>
    {% for ph in policyholders %}
    <option value="{{ ph.id }}">{{ ph.user.username }} - {{ ph.user.get_full_name|default:ph.user.email }}</option>
    {% endfor %}
</select>
</div>

<div class="field">
<label>Policy Number</label>
<input type="text" name="policy_number" required>
</div>

<div class="field">
<label>Insurer</label>

<select name="insurer">

<option>Star Health</option>
<option>HDFC ERGO</option>
<option>ICICI Lombard</option>
<option>Bajaj Allianz</option>

</select>

</div>

<div class="field">
<label>Start Date</label>
<input type="date" name="start_date" required>
</div>

<div class="field">
<label>End Date</label>
<input type="date" name="end_date" required>
</div>

<div class="field">
<label>Sum Insured</label>
<input type="number" name="sum_insured" required>
</div>

<div class="field">
<label>Premium Amount</label>
<input type="number" name="premium" step="0.01" required>
</div>

<div class="field">
<label>Deductible Amount</label>
<input type="number" name="deductible_amount" step="0.01" value="0">
</div>

</div>

<div class="nav-btns">

<button type="button" class="btn btn-secondary" onclick="prevStep(2)">
Back
</button>

<button type="submit" class="btn btn-primary">
Submit Policy
</button>

</div>

</div>

</form>

</div>
</div>
</div>

<script>

function nextStep(step){

document.getElementById("step"+step).classList.remove("active")

document.getElementById("step"+(step+1)).classList.add("active")

}

function prevStep(step){

document.getElementById("step"+step).classList.remove("active")

document.getElementById("step"+(step-1)).classList.add("active")

}

</script>

</body>
</html>
